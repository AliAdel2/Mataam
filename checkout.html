<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سلة الطلبات - مطعم الامبراطور</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --main-color:#2ecc71;
    --bg-light:#ffffff;
    --text-dark:#333;
    --card-bg:#f8f8f8;
    --border-color:#ddd;
}
body{
    background:var(--bg-light);
    color:var(--text-dark);
    font-family:'Cairo',sans-serif;
    padding-bottom:120px;
}
.header{
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:700;
    border-bottom:1px solid var(--border-color);
    background:var(--bg-light);
}
.product-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--card-bg);
    padding:10px 15px;
    border-radius:10px;
    margin-bottom:10px;
    border:1px solid var(--border-color);
}
.product-info{
    display:flex;
    align-items:center;
    gap:10px;
}
.product-info img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}
.qty-controls{
    display:flex;
    align-items:center;
    gap:5px;
}
.qty-btn{
    width:30px;
    height:30px;
    background:#fff;
    border:1px solid var(--border-color);
    border-radius:6px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    color:var(--main-color);
}
.total-bar{
    position:fixed;
    bottom:20px;
    left:20px;
    right:20px;
    background:var(--main-color);
    color:#000;
    padding:15px 20px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:700;
}
select, input{
    padding:5px;
    border-radius:6px;
    border:1px solid var(--border-color);
}
</style>
</head>
<body>

<div class="header">
📋 سلة طلباتك
</div>

<div class="container py-3" id="cartContainer">
    <!-- المنتجات هتظهر هنا ديناميكياً -->
</div>

<div class="container py-2">
    <label>اختر طريقة الطلب:</label>
    <select id="orderType" class="form-select mb-2">
        <option value="استلام">استلام من المطعم</option>
        <option value="توصيل">توصيل</option>
    </select>
    <div id="deliveryFeeRow" style="display:none;">
        رسوم التوصيل: <b id="deliveryFee">30</b> ج.م
    </div>
    <label>بياناتك:</label>
    <input type="text" id="customerName" placeholder="الاسم" class="form-control mb-2">
    <input type="text" id="customerPhone" placeholder="رقم الهاتف" class="form-control mb-2">
    <input type="text" id="customerAddress" placeholder="العنوان (للتوصيل)" class="form-control mb-2" style="display:none;">
    <button class="btn btn-success w-100" onclick="sendOrder()">تأكيد الطلب</button>
</div>

<div class="total-bar">
    <div>الإجمالي: <b id="totalPrice">0</b> ج.م</div>
</div>

<script>
// استرجاع السلة من localStorage
let cart = JSON.parse(localStorage.getItem('myCart')) || {};
const deliveryFeeAmount = 0;

function renderCart(){
    const container = document.getElementById('cartContainer');
    container.innerHTML='';
    for(let id in cart){
        const p = cart[id];
        container.innerHTML += `
        <div class="product-row">
            <div class="product-info">
                <img src="${p.img}" alt="${p.name}">
                <div>
                    <div>${p.name}</div>
                    <div>${p.price} ج.م</div>
                </div>
            </div>
            <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty(${p.id},-1)">-</button>
                <span>${p.qty}</span>
                <button class="qty-btn" onclick="updateQty(${p.id},1)">+</button>
            </div>
        </div>
        `;
    }
    updateTotal();
}

function updateQty(id,change){
    if(!cart[id]) return;
    cart[id].qty += change;
    if(cart[id].qty<=0) delete cart[id];
    localStorage.setItem('myCart',JSON.stringify(cart));
    renderCart();
}

function updateTotal(){
    let total=0;
    for(let id in cart) total += cart[id].qty*cart[id].price;
    if(document.getElementById('orderType').value==='توصيل') total+=deliveryFeeAmount;
    document.getElementById('totalPrice').innerText = total;
}

document.getElementById('orderType').addEventListener('change', function(){
    if(this.value==='توصيل') document.getElementById('customerAddress').style.display='block';
    else document.getElementById('customerAddress').style.display='none';
    updateTotal();
});

function sendOrder(){
    if(Object.keys(cart).length===0){ alert('السلة فارغة!'); return; }
    const name=document.getElementById('customerName').value.trim();
    const phone=document.getElementById('customerPhone').value.trim();
    const address=document.getElementById('customerAddress').value.trim();
    const type=document.getElementById('orderType').value;

    if(!name || !phone || (type==='توصيل' && !address)){
        alert('من فضلك املأ جميع البيانات المطلوبة.');
        return;
    }

    // تجهيز رسالة واتساب
    let msg = `طلب جديد من مطعم الامبراطور:%0A`;
    for(let id in cart){
        const p = cart[id];
        msg += `- ${p.name} x${p.qty} = ${p.price*p.qty} ج.م%0A`;
    }
    msg += `الإجمالي: ${document.getElementById('totalPrice').innerText} ج.م%0A`;
    msg += `طريقة الطلب: ${type}%0Aالاسم: ${name}%0Aالهاتف: ${phone}`;
    if(type==='توصيل') msg += `%0Aالعنوان: ${address}`;
    msg += `%0A  للعلم فى حالة التوصيل حساب الاوردر خارج التوصيل`;
    window.open(`https://wa.me/201040534865?text=${msg}`, '_blank');
}
renderCart();
</script>

</body>
</html>
