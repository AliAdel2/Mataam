<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطعم الامبراطور</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --main-color:#2ecc71;
    --bg-light:#ffffff;
    --text-dark:#333;
    --card-bg:#f8f8f8;
    --border-color: #eeeeee;
}
body{
    background:var(--bg-light);
    color:var(--text-dark);
    font-family:'Cairo',sans-serif;
    padding-bottom:120px;
}
.shop-header{
    text-align:center;
    font-size:28px;
    padding:25px 20px;
    position:sticky;
    top:0;
    z-index:1000;
    background:var(--bg-light);
    border-bottom:1px solid #ddd;
}
.shop-header h4{
    margin-bottom:25px;
    font-weight:700;
    font-size:1.7rem;
}
.carousel-inner img{
    height:150px;
    object-fit:cover;
    border-radius:10px;
}
.categories-bar{
    display:flex;
    overflow-x:auto;
    white-space:nowrap;
    padding:10px 0;
    gap:10px;
}
.cat-badge{
    padding:8px 16px;
    border-radius:50px;
    background:var(--card-bg);
    cursor:pointer;
    transition:0.3s;
    flex-shrink:0;
    font-size:0.9rem;
}
.cat-badge.active{background:var(--main-color); color:#000;}
.product-card{
  border: 1px solid var(--border-color);
    background:var(--card-bg);
    border-radius:15px;
    overflow:hidden;
    margin-bottom:15px;
    transition:0.3s;
}
.product-card:hover{border:1px solid var(--main-color);}
.product-img{
    width:100%;
    height:110px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1rem;
    object-fit:cover;
}
.product-info{padding:10px;}
.product-title{font-weight:700; font-size:0.95rem; margin-bottom:5px; height:20px; overflow:hidden;}
.product-price{color:var(--main-color); font-weight:700; display:block; margin-bottom:10px;}
.qty-controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#eee;
    border-radius:8px;
    padding:2px;
}
.qty-btn{
    background:#fff;
    border:1px solid #ddd;
    width:30px;
    height:30px;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--main-color);
    font-weight:bold;
}
.add-initial{
    width:100%;
    background:#fff;
    border:1px solid var(--main-color);
    color:var(--main-color);
    border-radius:8px;
    padding:5px;
    font-weight:700;
}
.cart-bar{
    position:fixed;
    bottom:20px;
    left:20px;
    right:20px;
    background:var(--main-color);
    color:#000;
    padding:15px 20px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 8px 25px rgba(241,196,15,0.4);
    z-index:1001;
    display:none;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="shop-header">
    <h4>👑 مطعم الامبراطور</h4>
     <h5 class="tagline">طعم يفرق عن أي مكان 😋</h5>
   


    <!-- Categories -->
    <div class="categories-bar" id="catBar">
        <div class="cat-badge active" onclick="filterProducts('الكل', this)">الكل</div>
        <div class="cat-badge" onclick="filterProducts('كشري', this)">🍝 كشري</div>
        <div class="cat-badge" onclick="filterProducts('طواجن', this)">🍲 طواجن</div>
        <div class="cat-badge" onclick="filterProducts('ميكسات', this)">🔥 ميكسات</div>
        <div class="cat-badge" onclick="filterProducts('سندوتشات', this)">🥪 سندوتشات</div>
        <div class="cat-badge" onclick="filterProducts('مشويات', this)">🍖 مشويات</div>
        <div class="cat-badge" onclick="filterProducts('حلو', this)">🍰 حلو</div>
    </div>
</div>

<div class="container py-3">
    <div class="row g-3" id="productsGrid"></div>
</div>

<a href="checkout.html" class="cart-bar" id="cartBar">
    <div><i class="fa-solid fa-basket-shopping me-2"></i><span id="cartCount">0</span> صنف | <b id="cartTotal">0</b> ج.م</div>
    <div class="fw-bold">عرض السلة <i class="fa-solid fa-chevron-left ms-1"></i></div>
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Products data with real images
const products=[
{id:1,name:'علبة ميني',price:30,cat:'كشري',img:'https://i.ibb.co/JwsBpcr6/IMG.jpg'},
{id:2,name:'علبة سوبر',price:40,cat:'كشري',img:'https://i.ibb.co/JwsBpcr6/IMG.jpg'},
{id:3,name:'طاجن لحمة',price:50,cat:'طواجن',img:'https://i.ibb.co/7xsLyPZM/for-web-1-30.jpg'},
{id:4,name:'طاجن فراخ',price:50,cat:'طواجن',img:'https://i.ibb.co/b5XvrSv5/images-4-6.jpg'},
{id:5,name:'كباب مشوي',price:120,cat:'مشويات',img:'https://i.ibb.co/mrPrp1nF/Fatafeat-26-Nov-article2-611791.png'},
{id:6,name:'فراخ مشوية',price:20,cat:'مشويات',img:'https://i.ibb.co/6cmJtpZ1/maxresdefault-2.jpg'}
];

let cart={};

function renderProducts(filter='الكل'){
    const grid=document.getElementById('productsGrid');
    grid.innerHTML='';
    const filtered=filter==='الكل'?products:products.filter(p=>p.cat===filter);
    filtered.forEach(p=>{
        const qty=cart[p.id]?cart[p.id].qty:0;
        grid.innerHTML+=`
        <div class="col-6 col-md-4">
        <div class="product-card">
            <img src="${p.img}" class="product-img rounded" alt="${p.name}">
            <div class="product-info">
                <h6 class="product-title">${p.name}</h6>
                <span class="product-price">${p.price} ج.م</span>
                <div id="btn-container-${p.id}">
                    ${qty>0?renderQtyControls(p.id,qty):`<button class="add-initial" onclick="updateQty(${p.id},1)">إضافة +</button>`}
                </div>
            </div>
        </div>
        </div>
        `;
    });
}

function renderQtyControls(id,qty){
    return `<div class="qty-controls">
        <button class="qty-btn" onclick="updateQty(${id},-1)">-</button>
        <span class="fw-bold">${qty}</span>
        <button class="qty-btn" onclick="updateQty(${id},1)">+</button>
    </div>`;
}

function updateQty(id,change){
    const product=products.find(p=>p.id===id);
    if(!cart[id]) cart[id]={...product,qty:0};
    cart[id].qty+=change;
    if(cart[id].qty<=0){ delete cart[id]; document.getElementById(`btn-container-${id}`).innerHTML=`<button class="add-initial" onclick="updateQty(${id},1)">إضافة +</button>`;}
    else document.getElementById(`btn-container-${id}`).innerHTML=renderQtyControls(id,cart[id].qty);
    updateCartBar();
    localStorage.setItem('myCart',JSON.stringify(cart));
}

function updateCartBar(){
    let count=0,total=0;
    for(let id in cart){ count+=cart[id].qty; total+=cart[id].qty*cart[id].price;}
    const bar=document.getElementById('cartBar');
    if(count>0){ bar.style.display='flex'; document.getElementById('cartCount').innerText=count; document.getElementById('cartTotal').innerText=total;}
    else bar.style.display='none';
}

function filterProducts(cat,el){
    document.querySelectorAll('.cat-badge').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    renderProducts(cat);
}

renderProducts();
</script>

</body>
</html>
