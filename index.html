    <style>
        :root { --main-color: #2ecc71; --bg-light: #ffffff; --card-bg: #f8f8f8; }
        body { background: var(--bg-light); font-family: 'Cairo', sans-serif; padding-bottom: 120px; }
        .shop-header { text-align: center; padding: 20px; position: sticky; top: 0; z-index: 1000; background: #fff; border-bottom: 1px solid #ddd; }
        .shop-header h4{
    margin-bottom:25px;
    font-weight:700;
    font-size:1.7rem;
}
        .categories-bar { display: flex; overflow-x: auto; padding: 10px 0; gap: 10px; }
        .cat-badge { padding: 8px 16px; border-radius: 50px; background: var(--card-bg); cursor: pointer; white-space: nowrap; }
        .cat-badge.active { background: var(--main-color); color: #fff; }
        
        .product-card { border: 1px solid #eee; background: var(--card-bg); border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
        .product-img { width: 100%; height: 120px; object-fit: cover; }
        .product-info { padding: 12px; }
        .product-price { color: var(--main-color); font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 8px; }
        
        /* أزرار التحكم +/- */
        .qty-controls { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid var(--main-color); border-radius: 10px; padding: 4px; }
        .qty-btn { background: var(--main-color); color: white; border: none; width: 32px; height: 32px; border-radius: 8px; font-weight: bold; }
        
        .add-initial { width: 100%; background: #fff; border: 2px solid var(--main-color); color: var(--main-color); border-radius: 10px; padding: 6px; font-weight: 700; }
        
        .cart-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--main-color); color: #fff; padding: 15px; border-radius: 15px; display: none; justify-content: space-between; text-decoration: none; z-index: 1001; }

let cart = {};

function renderProducts(filter = 'الكل') {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = '';
    const filtered = filter === 'الكل' ? products : products.filter(p => p.cat === filter);

    filtered.forEach(p => {
        grid.innerHTML += `
        <div class="col-6 col-md-4">
            <div class="product-card">
                <img src="${p.img}" class="product-img">
                <div class="product-info">
                    <h6 class="fw-bold" style="font-size:0.9rem">${p.name}</h6>
                    <select class="form-select form-select-sm mb-2" onchange="refreshProductUI(${p.id})">
                        ${p.variants.map((v, i) => `<option value="${i}">${v.name}</option>`).join('')}
                    </select>
                    <span class="product-price" id="price-${p.id}"></span>
                    <div id="controls-${p.id}"></div>
                </div>
            </div>
        </div>`;
        refreshProductUI(p.id); // تحديث السعر والزرار لأول مرة
    });
}

// دالة تحديث شكل المنتج بناءً على النوع المختار
function refreshProductUI(productId) {
    const product = products.find(p => p.id === productId);
    const select = document.querySelector(`#controls-${productId}`).parentElement.querySelector('select');
    const variantIdx = select.value;
    const variant = product.variants[variantIdx];
    const cartId = `${productId}-${variantIdx}`; // المعرف الفريد للصنف بنوعه

    // تحديث السعر
    document.getElementById(`price-${productId}`).innerText = `${variant.price} ج.م`;

    // تحديث شكل الزرار (إضافة أو +/-)
    const container = document.getElementById(`controls-${productId}`);
    if (cart[cartId] && cart[cartId].qty > 0) {
        container.innerHTML = `
            <div class="qty-controls">
                <button class="qty-btn" onclick="updateQty('${cartId}', -1, ${productId})">-</button>
                <span class="fw-bold">${cart[cartId].qty}</span>
                <button class="qty-btn" onclick="updateQty('${cartId}', 1, ${productId})">+</button>
            </div>`;
    } else {
        container.innerHTML = `<button class="add-initial" onclick="updateQty('${cartId}', 1, ${productId})">إضافة +</button>`;
    }
}

function updateQty(cartId, change, productId) {
    if (!cart[cartId]) {
        const [pId, vIdx] = cartId.split('-');
        const product = products.find(p => p.id == pId);
        const variant = product.variants[vIdx];
        cart[cartId] = { name: `${product.name} (${variant.name})`, price: variant.price, qty: 0 };
    }

    cart[cartId].qty += change;

    if (cart[cartId].qty <= 0) delete cart[cartId];

    refreshProductUI(productId);
    updateCartBar();
    localStorage.setItem('myCart', JSON.stringify(cart));
}

function updateCartBar() {
    let count = 0, total = 0;
    for (let key in cart) {
        count += cart[key].qty;
        total += cart[key].qty * cart[key].price;
    }
    const bar = document.getElementById('cartBar');
    if (count > 0) {
        bar.style.display = 'flex';
        document.getElementById('cartCount').innerText = count;
        document.getElementById('cartTotal').innerText = total;
    } else {
        bar.style.display = 'none';
    }
}

function filterProducts(cat, el) {
    document.querySelectorAll('.cat-badge').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderProducts(cat);
}
